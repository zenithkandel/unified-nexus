<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Unified Nexus Admin - Login</title>
    <link rel="stylesheet" href="../css/variables.css" />
    <link rel="stylesheet" href="../css/themes.css" />
    <link rel="stylesheet" href="../css/base.css" />
    <link rel="stylesheet" href="../css/admin.css" />
    <script src="https://zenithkandel.com.np/fontawesome/zenith-icons.js"></script>
    <style>
      body {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background-color: var(--color-bg-base);
        margin: 0;
        font-family: var(--font-body);
      }
      .login-container {
        width: 100%;
        max-width: 400px;
        background: color-mix(in srgb, var(--surface-panel) 95%, transparent);
        border: 1px solid color-mix(in srgb, var(--line-soft) 86%, transparent);
        padding: 2.5rem;
        border-radius: 12px;
        box-shadow: var(--shadow-medium);
        text-align: center;
        position: relative;
      }
      .login-logo {
        font-size: 2.5rem;
        color: var(--accent);
        margin-bottom: 1rem;
      }
      .login-container h1 {
        font-family: var(--font-heading);
        margin-bottom: 0.5rem;
        font-size: 2rem;
        color: var(--text-strong);
      }
      .login-container p.subtitle {
        color: var(--text-muted);
        margin-bottom: 2rem;
        font-size: 0.95rem;
      }
      .input-group {
        position: relative;
        margin-bottom: 1.5rem;
        text-align: left;
      }
      .input-group i {
        position: absolute;
        left: 14px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--text-muted);
      }
      .input-group input {
        width: 100%;
        padding: 0.8rem 1rem 0.8rem 2.8rem;
        border: 1px solid var(--line-soft);
        border-radius: 8px;
        background: var(--surface-0);
        color: var(--text-strong);
        font-size: 1rem;
        transition: border-color 0.3s ease;
      }
      .input-group input:focus {
        border-color: var(--accent);
        outline: none;
      }
      .login-btn {
        width: 100%;
        padding: 0.8rem;
        background: var(--accent);
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 1rem;
        font-weight: 500;
        cursor: pointer;
        transition:
          background 0.3s ease,
          transform 0.2s ease;
        margin-bottom: 1.5rem;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 0.5rem;
      }
      .login-btn:hover {
        background: color-mix(in srgb, var(--accent) 85%, black);
        transform: translateY(-2px);
      }
      .unintentional-link {
        display: block;
        margin-top: 1rem;
        color: var(--text-muted);
        font-size: 0.85rem;
        text-decoration: none;
        transition: color 0.3s;
      }
      .unintentional-link:hover {
        color: var(--accent);
        text-decoration: underline;
      }
      .status {
        font-size: 0.85rem;
        min-height: 1.2rem;
        margin-bottom: 1rem;
      }
      .status.error {
        color: var(--error);
      }
      .status.success {
        color: var(--success);
      }
    </style>
  </head>
  <body>
    <div class="login-container">
      <i class="fa-duotone fa-shield-keyhole login-logo"></i>
      <h1>Console Access</h1>
      <p class="subtitle">Secure administrative panel.</p>

      <form id="loginForm" novalidate>
        <div class="input-group">
          <i class="fa-solid fa-lock"></i>
          <input
            id="adminPassword"
            name="password"
            type="password"
            placeholder="Passcode"
            required
          />
        </div>
        <p id="loginStatus" class="status" aria-live="polite"></p>
        <button class="login-btn" type="submit">
          <span>Authenticate</span>
          <i class="fa-solid fa-arrow-right-to-bracket"></i>
        </button>
      </form>

      <a href="../index.html" class="unintentional-link">
        <i class="fa-regular fa-house"></i> Looks like you're lost. Return to
        Home.
      </a>
    </div>

    <script type="module">
      import { apiFetch } from "../js/api-client.js";

      const loginForm = document.getElementById("loginForm");
      const loginStatus = document.getElementById("loginStatus");

      loginForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        loginStatus.textContent = "Authenticating...";
        loginStatus.className = "status";

        const password = document.getElementById("adminPassword").value;

        try {
          const res = await apiFetch("../api/admin/login.php", {
            method: "POST",
            body: JSON.stringify({ password }),
          });

          if (res.status === "success") {
            loginStatus.textContent = "Success! Redirecting...";
            loginStatus.className = "status success";
            setTimeout(() => {
              window.location.href = "index.html";
            }, 500);
          } else {
            loginStatus.textContent = res.message || "Invalid credentials.";
            loginStatus.className = "status error";
          }
        } catch (err) {
          loginStatus.textContent = err.message || "Connection error.";
          loginStatus.className = "status error";
        }
      });
    </script>
  </body>
</html>
