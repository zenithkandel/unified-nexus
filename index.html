<!doctype html>
<html lang="en" data-theme="light">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<meta name="description" content="Unified Nexus - We Work We Win">
	<title>Unified Nexus | We Work We Win</title>
	<link rel="stylesheet" href="css/variables.css">
	<link rel="stylesheet" href="css/themes.css">
	<link rel="stylesheet" href="css/base.css">
	<link rel="stylesheet" href="css/layout.css">
	<link rel="stylesheet" href="css/components.css">
	<link rel="stylesheet" href="css/sections.css">
	<link rel="stylesheet" href="css/animations.css">
</head>
<body>
	<div id="loader" class="loader" aria-live="polite">
		<div class="loader-curtain loader-curtain-left"></div>
		<div class="loader-curtain loader-curtain-right"></div>
		<p class="loader-text">Unified Nexus</p>
	</div>

	<header class="site-header" id="top">
		<div class="container header-content">
			<a class="brand" href="#hero">Unified Nexus</a>
			<button id="themeToggle" class="btn btn-ghost" type="button" aria-label="Toggle theme">Theme</button>
		</div>
		<nav class="main-nav container" aria-label="Primary navigation">
			<a href="#hero">Home</a>
			<a href="#about">About</a>
			<a href="#clubs">Clubs</a>
			<a href="#executive">Leadership</a>
			<a href="#apply">Apply</a>
		</nav>
	</header>

	<main>
		<section id="hero" class="section hero-section">
			<div class="hero-backdrop" aria-hidden="true">
				<div id="particles" class="particles-layer"></div>
			</div>
			<div class="container hero-content">
				<p class="eyebrow">Student-Led Creative Platform</p>
				<h1>We Work We Win</h1>
				<p class="lead">Unified Nexus fosters creativity, collaboration, expression, leadership, and social impact.</p>
				<a class="btn btn-accent" href="#apply">Join Unified Nexus</a>
			</div>
		</section>

		<section id="about" class="section">
			<div class="container">
				<h2>About Unified Nexus</h2>
				<div id="aboutContent"></div>
			</div>
		</section>

		<section id="clubs" class="section section-alt">
			<div class="container">
				<h2>Clubs and Activities</h2>
				<div id="clubsGrid" class="card-grid"></div>
			</div>
		</section>

		<section id="executive" class="section">
			<div class="container">
				<h2>Executive Team</h2>
				<div id="executiveGrid" class="card-grid"></div>
			</div>
		</section>

		<section id="apply" class="section section-alt">
			<div class="container">
				<h2>Apply to Join</h2>
				<form id="applyForm" class="form-panel" novalidate>
					<label for="name">Name</label>
					<input id="name" name="name" type="text" maxlength="120" required>

					<label for="email">Email</label>
					<input id="email" name="email" type="email" maxlength="150" required>

					<label for="phone">Phone (optional)</label>
					<input id="phone" name="phone" type="text" maxlength="30">

					<label for="clubId">Select Club</label>
					<select id="clubId" name="clubId" required>
						<option value="">Choose a club</option>
					</select>

					<label for="message">Message</label>
					<textarea id="message" name="message" maxlength="1500" required></textarea>

					<button class="btn btn-accent" type="submit">Submit Application</button>
					<p id="formStatus" class="form-status" aria-live="polite"></p>
				</form>
			</div>
		</section>
	</main>

	<script type="module" src="js/app.js"></script>
</body>
</html>
